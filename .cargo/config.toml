# Local build configuration.
#
# The DecentDB engine depends on `libpg_query_sys`, which uses `bindgen` and
# therefore needs `libclang` at build time.
#
# Do not set LIBCLANG_PATH here by default. The path is OS- and distro-specific,
# and a stale active value prevents bindgen from using its normal discovery.
#
# If bindgen cannot find libclang, set LIBCLANG_PATH in your shell to the
# directory containing libclang.so/libclang.dylib/libclang.dll, for example:
#
#   LIBCLANG_PATH=/usr/lib64/llvm22/lib64 cargo build
#
# Common Linux locations:
#   Debian/Ubuntu: /usr/lib/llvm-*/lib
#   Fedora/RHEL:   /usr/lib64/llvm*/lib64
